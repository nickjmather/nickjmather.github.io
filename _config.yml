remote_theme: "mmistakes/minimal-mistakes"
   minimal_mistakes_skin: "default" # options: air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise
   
   plugins:
     - jekyll-remote-theme
title: "Nick Mather | Portfolio"
   description: "UI/UX + graphic designer"
   url: "https://username.github.io"
   
   author:
     name: "Nick Mather"
     bio: "A graphic designer with over 30 years of broad experience, with a current focus on UI."
     collections:
  portfolio:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: false
      share: true
